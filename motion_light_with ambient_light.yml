blueprint:
  name: Motion-activated Light with Ambient Light Condition
  description: Turn on a light when motion is detected and ambient light is below a threshold.
  domain: automation
  source_url: https://github.com/Gargy007/ha_blueprints/blob/main/motion_light_with%20ambient_light.yml
  author: Home Assistant
  input:
    motion_entity:
      name: Motion Sensor
      selector:
        entity:
          filter:
            - device_class: occupancy
              domain: binary_sensor
            - device_class: motion
              domain: binary_sensor
    light_target:
      name: Light
      selector:
        target:
          entity:
            domain: light
    no_motion_wait:
      name: Wait time
      description: Time to leave the light on after last motion is detected.
      default: 120
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: seconds
    ambient_light_sensor:
      name: Ambient Light Sensor
      description: Light will only turn on when illuminance is below the threshold.
      selector:
        entity:
          filter:
            - device_class: illuminance
              domain: sensor
    ambient_light_threshold:
      name: Ambient Light Threshold
      description: Maximum illuminance (lux) to allow light activation.
      default: 50
      selector:
        number:
          min: 0
          max: 1000
          unit_of_measurement: lux

# If motion is detected within the delay,
# we restart the script.
mode: restart
max_exceeded: silent

triggers:
  trigger: state
  entity_id: !input motion_entity
  from: "off"
  to: "on"

conditions:
  - condition: numeric_state
    entity_id: !input ambient_light_sensor
    below: !input ambient_light_threshold

actions:
  - alias: "Turn on the light"
    action: light.turn_on
    target: !input light_target
  - alias: "Wait until there is no motion from device"
    wait_for_trigger:
      trigger: state
      entity_id: !input motion_entity
      from: "on"
      to: "off"
  - alias: "Wait the number of seconds that has been set"
    delay: !input no_motion_wait
  - alias: "Turn off the light"
    action: light.turn_off
    target: !input light_target
